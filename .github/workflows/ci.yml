  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check . --exit-zero

  dbt:
    name: Validate dbt models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Run dbt parse
        run: dbt parse --project-dir dbt/ --profiles-dir dbt/