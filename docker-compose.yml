services:

  spark:
    build: .                          # uses Dockerfile in project root
    environment:
      - SPARK_MODE=master
      - PYTHONPATH=/app
    volumes:
      - .:/app                        # mounts entire project into /app
    working_dir: /app
    ports:
      - "4040:4040"                   # Spark UI — open http://localhost:4040 while jobs run
    platform: linux/amd64             # works on both Intel and Apple Silicon
    env_file:
      - .env

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5442:5432"                   # 5442 on host to avoid conflict with local PostgreSQL
    volumes:
      - ./postgres_data:/var/lib/postgresql/data    # bind mount — visible in DataGrip/pgAdmin
    env_file:
      - .env